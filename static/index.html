<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chudnelius</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f0e;
      --bg-raised: #141a16;
      --bg-lift:   #1c2620;
      --border:    #2a3d30;
      --green:     #7ecba1;
      --pink:      #e8a0bf;
      --purple:    #c49fd4;
      --text:      #d4e8d8;
      --muted:     #5e7a65;
      --error:     #e07a8a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    header h1 {
      color: var(--pink);
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      font-weight: 700;
    }

    #status {
      color: var(--green);
      font-size: 0.8rem;
      font-style: italic;
      margin-left: auto;
    }

    /* ── Chat log ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .msg {
      max-width: 80%;
      line-height: 1.6;
      font-size: 0.875rem;
      white-space: pre-wrap;
      word-break: break-word;
      user-select: text;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--bg-lift);
      border: 1px solid var(--border);
      border-radius: 12px 12px 2px 12px;
      padding: 0.6rem 1rem;
      color: var(--green);
    }

    .msg.agent {
      align-self: flex-start;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 12px 12px 12px 2px;
      padding: 0.6rem 1rem;
      color: var(--text);
    }

    .msg.agent .label {
      color: var(--pink);
      font-weight: 700;
      font-size: 0.75rem;
      margin-bottom: 0.25rem;
    }

    .msg.tool {
      align-self: flex-start;
      color: var(--muted);
      font-size: 0.75rem;
      font-style: italic;
      padding-left: 0.5rem;
      border-left: 2px solid var(--border);
    }

    .msg.error {
      align-self: center;
      color: var(--error);
      font-size: 0.8rem;
    }

    /* streaming cursor */
    .cursor::after {
      content: '▋';
      animation: blink 0.8s step-end infinite;
      color: var(--pink);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Input bar ── */
    #input-bar {
      background: var(--bg-raised);
      border-top: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-shrink: 0;
    }

    #message-input {
      flex: 1;
      background: var(--bg-lift);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      padding: 0.6rem 1rem;
      outline: none;
      transition: border-color 0.15s;
      resize: none;
      height: 40px;
      max-height: 120px;
      overflow-y: auto;
    }

    #message-input:focus { border-color: var(--green); }
    #message-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--bg-lift);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--purple);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.5rem 1rem;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    #send-btn:hover { background: var(--border); color: var(--pink); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* scrollbar */
    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: var(--bg); }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    #chat::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<header>
  <h1>✦ CHUDNELIUS</h1>
  <span id="status">● Idle</span>
</header>

<div id="chat"></div>

<div id="input-bar">
  <textarea
    id="message-input"
    placeholder="Ask Chudnelius..."
    rows="1"
  ></textarea>
  <button id="send-btn">➤</button>
</div>

<script>
  const chat       = document.getElementById('chat');
  const input      = document.getElementById('message-input');
  const sendBtn    = document.getElementById('send-btn');
  const statusEl   = document.getElementById('status');

  // ── Helpers ────────────────────────────────────────────────────────────────

  function setStatus(text, active = false) {
    statusEl.textContent = active ? `◌ ${text}` : `● ${text}`;
    statusEl.style.color = active ? 'var(--purple)' : 'var(--green)';
  }

  function appendMessage(type, content = '') {
    const div = document.createElement('div');
    div.classList.add('msg', type);
    if (type === 'agent') {
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = 'Agent';
      div.appendChild(label);
    }
    const body = document.createElement('span');
    body.textContent = content;
    div.appendChild(body);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return body;  // return the text node so we can append chunks to it
  }

  function appendTool(name) {
    appendMessage('tool', `⚙ calling ${name}…`);
  }

  // ── Load history on page open ──────────────────────────────────────────────

  async function loadHistory() {
    const res = await fetch('/history');
    const history = await res.json();
    history.forEach(msg => {
      if (msg.role === 'user')      appendMessage('user', msg.content);
      if (msg.role === 'assistant') appendMessage('agent', msg.content);
    });
  }

  // ── Send message ───────────────────────────────────────────────────────────

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = '40px';
    sendBtn.disabled = true;
    input.disabled = true;
    setStatus('Thinking…', true);

    appendMessage('user', text);

    // Create the agent bubble now — we'll stream chunks into it
    const agentBody = appendMessage('agent');
    agentBody.parentElement.classList.add('cursor');

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n');
      buffer = parts.pop(); // keep incomplete event in buffer

      for (const part of parts) {
        const eventLine = part.split('\n').find(l => l.startsWith('event:'));
        const dataLine  = part.split('\n').find(l => l.startsWith('data:'));
        if (!eventLine || !dataLine) continue;

        const event = eventLine.replace('event:', '').trim();
        const data  = JSON.parse(dataLine.replace('data:', '').trim());

        if (event === 'chunk') {
          agentBody.textContent += data.text;
          chat.scrollTop = chat.scrollHeight;
        } else if (event === 'tool') {
          appendTool(data.text);
        } else if (event === 'error') {
          appendMessage('error', data.text);
        } else if (event === 'done') {
          break;
        }
      }
    }

    agentBody.parentElement.classList.remove('cursor');
    setStatus('Idle');
    sendBtn.disabled = false;
    input.disabled = false;
    input.focus();
  }

  // ── Events ─────────────────────────────────────────────────────────────────

  sendBtn.addEventListener('click', sendMessage);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = '40px';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  loadHistory();
</script>

</body>
</html>
